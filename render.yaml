services:
  - type: web
    name: snapytube-ultimate
    env: python
    region: oregon
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      apt-get install -y ffmpeg 2>/dev/null || pip install imageio[ffmpeg] 2>/dev/null || true
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 600 --worker-class gthread
    envVars:
      - key: RENDER
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11.0"
    healthCheckPath: /api/health
